                  <div class="rounded-2xl bg-slate-50 p-3"><span class="font-bold">타입 / 属性</span><br/>${selected.typeKo} / ${selected.typeZh}</div>
                  <div class="rounded-2xl bg-slate-50 p-3"><span class="font-bold">세대 / 世代</span><br/>${selected.genKo} / ${selected.genZh}</div>
                  <div class="rounded-2xl bg-slate-50 p-3"><span class="font-bold">분류 / 分类</span><br/>${selected.categoryKo} / ${selected.categoryZh}</div>
                  <div class="rounded-2xl bg-slate-50 p-3"><span class="font-bold">신장·체중 / 身高·体重</span><br/>${selected.height} / ${selected.weight}</div>
                </div>
              </div>

              <div class="rounded-[26px] bg-white p-5 shadow-sm">
                <p class="text-xs font-bold uppercase tracking-[0.24em] text-slate-400">Description / 角色说明</p>
                <p class="mt-3 text-sm leading-7 text-slate-700">${selected.descKo}<br/>${selected.descZh}</p>
              </div>
            </div>
          </div>
        `;
      }

      app.innerHTML = `
        <div class="p-6">
          <div class="mx-auto max-w-[470px] rounded-[40px] border border-white/60 bg-white/20 p-4 shadow-2xl backdrop-blur-sm">
            <div class="mx-auto flex min-h-[92vh] max-w-[430px] flex-col overflow-hidden rounded-[36px] bg-gradient-to-b from-[#fff8e7] via-white to-[#eef6ff] shadow-[0_30px_80px_rgba(15,23,42,0.20)]">
              <div class="border-b border-white/70 bg-white/75 px-6 py-5 backdrop-blur">
                <div class="flex items-center justify-between gap-3">
                  <div>
                    <p class="text-[11px] font-bold uppercase tracking-[0.28em] text-slate-400">Information Kiosk Demo</p>
                    <h1 class="mt-1 text-2xl font-black text-slate-900">포켓몬 캐치 스테이션 / 宝可梦捕捉站</h1>
                  </div>
                  ${screen !== 'home' ? '<button onclick="goHome()" class="rounded-2xl bg-slate-900 p-3 text-white shadow">←</button>' : ''}
                </div>
              </div>
              ${content}
            </div>
          </div>
        </div>
      `;
    }

    function setType(type) { selectedType = type; render(); }
    function pickRandom() {
      const filtered = selectedType === "전체" ? POKEMON : POKEMON.filter(p => p.type === selectedType);
      selected = filtered[Math.floor(Math.random() * filtered.length)];
      screen = "random";
      render();
    }
    function openDetail(id) { selected = POKEMON.find(p => p.id === id); screen = "detail"; render(); }
    function openFirst() {
      const filtered = selectedType === "전체" ? POKEMON : POKEMON.filter(p => p.type === selectedType);
      selected = filtered[0];
      screen = "detail";
      render();
    }
    function goHome() { screen = "home"; render(); }

    render();
  </script>
</body>
</html>
